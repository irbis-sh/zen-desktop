labels: ["status:needs-confirmation"]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Thank you for taking the time to report an issue in Zen.
        > Before submitting, review the [troubleshooting guide](https://docs.irbis.sh/docs/zen/how-to/troubleshoot/) and search the [issue tracker](https://github.com/irbis-sh/zen-desktop/issues?q=is%3Aissue) and [prior discussions](https://github.com/irbis-sh/zen-desktop/discussions/categories/issue-triage) to see whether the issue has already been reported.
        > Please fill out the information below to help us reproduce and resolve the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        Describe the issue you are experiencing in as much detail as possible.
        Attach screenshots or screen recordings if they help explain the issue.
    validations:
      required: true

  - type: input
    id: os-kind
    attributes:
      label: Operating system
      description: |
        What operating system and version are you using?
        If you are using Linux, include the distribution and desktop environment (for example, GNOME).
      placeholder: Windows XP
    validations:
      required: true

  - type: textarea
    id: debug-data
    attributes:
      label: Debug data
      description: |
        Paste the debug data exported from Settings:

        1. Open `Settings`
        2. Under App, click `Export debug data`
        3. Paste the clipboard contents here
      placeholder: |
        {
          "enabledFilterListURLs": [
            "https://cdn.jsdelivr.net/gh/irbis-sh/filter-lists@master/ads/ads.txt",
            "https://easylist.to/easylist/easylist.txt",
            ...
      render: json
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Provide detailed step-by-step instructions for reproducing the issue.
      placeholder: |
        1. Open Zen
        2. Click "Start"
        3. Wait for loading to complete
        4. Observe the error message
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        If relevant, include logs generated by Zen.

        To locate the logs:

        1. Click `Export logs` in Settings
        2. Open `application.log`
        3. Go to the end of the file

        Zen prints `<datetime>: initializing the app; version="..."` when the application starts.
        Logs may be noisy, so focus on error messages and warnings near the time the issue occurred.

        > [!IMPORTANT]
        > Despite our best efforts at redaction, **logs may contain sensitive data and personally identifiable information (PII)**, such as IP addresses and hostnames your computer has connected to.
        > It is your responsibility to remove any sensitive information before sharing logs here.
      render: text

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any additional information that may be relevant to the issue.
      placeholder: |
        What browser/browsers are you using?
        Are you using any other tunnels, proxies, or VPNs?
        Are you using antivirus software?
        Which apps or websites seem to be affected?
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: "I acknowledge that:"
      options:
        - label: I have reviewed the [troubleshooting guide](https://docs.irbis.sh/docs/zen/how-to/troubleshoot/) and confirmed that my issue is not listed there.
          required: true
        - label: I have searched existing [Discussions](https://github.com/irbis-sh/zen-desktop/discussions) and [Issues](https://github.com/irbis-sh/zen-desktop/issues) (including closed ones) and confirmed this is not a duplicate.
          required: true
        - label: I have checked the "Preview" tab for all fields to ensure everything looks correct.
          required: true
