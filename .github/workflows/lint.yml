name: Lint

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-go:
    name: Lint Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      # These permissions are required by golangci-lint to create annotations for PRs.
      # https://github.com/golangci/golangci-lint-action?tab=readme-ov-file
      contents: read
      pull-requests: read
      checks: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
      - name: Run go version
        run: go version
      - name: Create placeholder asset
        # go:embed in main.go requires the directory to exist and be non-empty
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/placeholder
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/package.json
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Run node --version
        run: node --version
      - name: Set up Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run frontend formatting check
        run: task frontend:fmt
      - name: Run frontend linter
        run: task frontend:lint

  lint-extended-css:
    name: Lint jslibs/extended-css
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: jslibs/extended-css/package.json
          cache: 'npm'
          cache-dependency-path: jslibs/extended-css/package-lock.json
      - name: Run node --version
        run: node --version
      - name: Install dependencies
        run: npm ci
        working-directory: jslibs/extended-css
      - name: Run linter
        run: npm run lint
        working-directory: jslibs/extended-css

  lint-scriptlets:
    name: Lint jslibs/scriptlets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: jslibs/scriptlets/package.json
          cache: 'npm'
          cache-dependency-path: jslibs/scriptlets/package-lock.json
      - name: Run node --version
        run: node --version
      - name: Install dependencies
        run: npm ci
        working-directory: jslibs/scriptlets
      - name: Run linter
        run: npm run lint
        working-directory: jslibs/scriptlets

  lint-actions:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@b572f7b1a1c2d41efaab43d504f68d215c3cd727 # v0.5.4
