name: Update product version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Product version to set (e.g. 0.19.0)"
        required: true

jobs:
  update-product-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Update wails.json
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.json.tmp && mv wails.json.tmp wails.json

      - name: Create PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "wails.json: set productVersion to ${{ github.event.inputs.version }}"
          title: "Update product version to ${{ github.event.inputs.version }}"
          add-paths: wails.json
          body: |
            ### Description

            Set `info.productVersion` in `wails.json` to `${{ github.event.inputs.version }}`.

            This PR was automatically generated by the `update-product-version` workflow.
          branch: github-actions-bot/product-version-${{ github.event.inputs.version }}
          delete-branch: true
          base: master
