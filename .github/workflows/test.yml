name: Test

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-go:
    name: Test Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
      - name: Run go version
        run: go version
      - name: Set up Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create placeholder asset
        # go:embed requires the directory to exist and be non-empty
        run: |
          mkdir -p ./frontend/dist
          touch ./frontend/dist/placeholder
      - name: Run tests
        run: task test-go

  test-extended-css:
    name: Test jslibs/extended-css
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: jslibs/extended-css/package.json
          cache: 'npm'
          cache-dependency-path: jslibs/extended-css/package-lock.json
      - name: Run node --version
        run: node --version
      - name: Install dependencies
        run: npm ci
        working-directory: jslibs/extended-css
      - name: Run tests
        run: npm run test
        working-directory: jslibs/extended-css

  test-scriptlets:
    name: Test jslibs/scriptlets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: jslibs/scriptlets/package.json
          cache: 'npm'
          cache-dependency-path: jslibs/scriptlets/package-lock.json
      - name: Run node --version
        run: node --version
      - name: Install dependencies
        run: npm ci
        working-directory: jslibs/scriptlets
      - name: Run tests
        run: npm run test
        working-directory: jslibs/scriptlets
